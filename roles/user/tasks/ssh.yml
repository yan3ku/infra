---
- name: Allow passwordless sudo
  copy:
    dest: "/etc/sudoers.d/{{ username }}"
    content: "{{ username }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: '0440'

- name: Ensure .ssh directory exists
  file:
    path: "{{ HOMEDIR }}/.ssh"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0700'

- name: Add SSH public key to authorized_keys
  authorized_key:
    user: "{{ username }}"
    key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
    state: present

- name: Copy private SSH key
  copy:
    src: "~/.ssh/id_ed25519"
    dest: "{{ HOMEDIR }}/.ssh/id_ed25519"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0600'
